<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schools, PTAs, Income and Demography</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="map-shell">
    <header class="map-header">
      <div>
        <h1>Schools with and without PTAs</h1>
        <p class="subtitle">
          Census tracts are shaded by median household income. School markers are colored by PTA status.
        </p>
      </div>
    </header>

    <div class="tab-bar">
      <button class="tab-button active" data-view="schools">PTA and income</button>
      <button class="tab-button" data-view="density">Race dot density</button>
    </div>

    <div id="map"></div>

    <div class="legend" id="legend"></div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
